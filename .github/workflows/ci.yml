name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Linux clipboard + GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xclip xvfb libxext6 libxrender1

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pytest

      - name: Byte-compile (syntax check)
        run: python -m compileall mc_shot_sync

      - name: CLI smoke test
        run: |
          mc-shot-sync --version
          mc-shot-sync status

      - name: Run tests
        run: python -m pytest -q
